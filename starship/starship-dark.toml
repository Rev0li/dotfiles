# Starship — Dark theme (Tokyo Night / Rose Pine Moon)
# https://starship.rs/config/

format = "$username$hostname$directory$git_branch$git_status$git_state$rust$nodejs$python$c$cmd_duration$character"
command_timeout = 1000

# ── Prompt character ────────────────────────────────────────

[character]
success_symbol = "[➜](bold green)"
error_symbol   = "[✗](bold red)"
vimcmd_symbol  = "[N](bold green)"

# ── Identité ────────────────────────────────────────────────

[username]
style_user  = "bold #ff99ff"
style_root  = "bold red"
format      = "[$user]($style)"
show_always = true

[hostname]
ssh_only = false
format   = "[@$hostname](bold cyan) "

# ── Localisation ────────────────────────────────────────────

[directory]
truncation_length = 3
truncate_to_repo  = true
format            = "[◆](bold #d3ffff) [$path]($style)[$read_only]($read_only_style) "
style             = "bold #e0b3e5"
read_only         = " 🔒"
read_only_style   = "red"

# ── Git ─────────────────────────────────────────────────────

[git_branch]
symbol = " "
format = "[◆](bold #d3ffff)[$symbol$branch]($style) "
style  = "bold #edccf1"

[git_status]
format     = '([\[$all_status$ahead_behind\]]($style) )'
style      = "bold yellow"
conflicted = "🏳"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = "✓"
untracked  = "?${count}"
stashed    = "$${count}"
modified   = "!${count}"
staged     = "+${count}"
renamed    = "»${count}"
deleted    = "✘${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style  = "bright-black"

# ── Langages ────────────────────────────────────────────────

[rust]
symbol = " "
format = "via [$symbol($version )]($style)"
style  = "bold red"

[nodejs]
symbol = " "
format = "via [$symbol($version )]($style)"
style  = "bold green"

[python]
symbol = " "
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style  = "bold yellow"

[c]
symbol = " "
format = "via [$symbol($version(-$name) )]($style)"
style  = "bold 149"

# ── Timing ──────────────────────────────────────────────────

[cmd_duration]
min_time = 500
format   = "took [$duration]($style) "
style    = "bold yellow"
